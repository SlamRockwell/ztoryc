<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Shot block outline -->
  <rect x="3" y="7" width="18" height="10" rx="1.5" fill="none" stroke="#E6E6E6" stroke-width="1.5"/>
  <!-- Left arrow (content shifting left) -->
  <line x1="9" y1="12" x2="6" y2="12" stroke="#E6E6E6" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="7.5,10 5.5,12 7.5,14" fill="none" stroke="#E6E6E6" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Right arrow (content shifting right) -->
  <line x1="15" y1="12" x2="18" y2="12" stroke="#E6E6E6" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="16.5,10 18.5,12 16.5,14" fill="none" stroke="#E6E6E6" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
