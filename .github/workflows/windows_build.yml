name: Ztoryc Windows Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release with the Windows artifacts'
        required: false
        default: 'false'
        type: boolean
      release_tag:
        description: 'Release tag (default: v<semver from ZtorycVersion.cmake>)'
        required: false
        default: ''

jobs:
  Windows:
    runs-on: windows-2022
    env:
      CCACHE_MAXSIZE: 5G
      CCACHE_COMPRESS: 'true'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Restore cache
        id: restore-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/AppData/Local/ccache
          key: ${{ runner.os }}-refs/heads/master
          restore-keys: |
            ${{ runner.os }}-
      - name: Restore external dependency cache
        id: restore-deps-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            thirdparty/qt
            C:\tools\opencv
            C:\local\boost_1_87_0
          key: ${{ runner.os }}-deps-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/read_thirdparty_version.py', 'ci-scripts/windows/tahoma-install.bat', 'ci-scripts/windows/tahoma-get3rdpartyapps.bat', 'ci-scripts/windows/tahoma-build.bat') }}
      - name: Install Dependencies
        run: |
          ci-scripts\windows\tahoma-install.bat
          choco install ccache -y
          copy C:\ProgramData\chocolatey\lib\ccache\tools\ccache*\ccache.exe C:\ProgramData\chocolatey\bin\cl.exe
          mkdir %LOCALAPPDATA%\ccache
      - name: Get CanonSDK
        if: ${{ (github.repository_owner == 'tahoma2d' || github.repository_owner == 'manongjohn') && github.event_name == 'push' }}
        run: |
          curl -H "Authorization: token ${{ secrets.TAHOMA2D_TOKEN }}" -H "Accept:application/octet-stream" -fsSL -o EDSDK_Windows.zip https://api.github.com/repos/tahoma2d/CanonSDK/releases/assets/223415203
          7z x EDSDK_Windows.zip -oEDSDK_Windows
          move EDSDK_Windows\EDSDK\Header thirdparty\canon
          move EDSDK_Windows\EDSDK_64\Dll thirdparty\canon
          move EDSDK_Windows\EDSDK_64\Library thirdparty\canon
      - name: Get 3rd Party Apps
        run: |
          ci-scripts\windows\tahoma-get3rdpartyapps.bat
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Build Ztoryc
        run: |
          ci-scripts\windows\tahoma-build.bat
      - name: Create Package
        run: |
          ci-scripts\windows\tahoma-buildpkg.bat
      - uses: actions/upload-artifact@v4
        with:
          name: Ztoryc-portable-win.zip
          path: toonz\build\Ztoryc-portable-win.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Ztoryc-install-win.exe
          path: toonz\build\Ztoryc-install-win.exe
      - name: Get Nightly Release Date
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          chcp 65001 #set code page to utf-8
          echo ("NIGHTLYDATE=" + (Get-Date -format "yyyy-MM-dd")) >> $env:GITHUB_ENV
          echo ("NIGHTLYDATETIME=" + (Get-Date -format "yyyy-MM-dd HH:mm:ss UTC")) >> $env:GITHUB_ENV
      - name: Create/Update Nightlies Tag
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          git remote add nightly_repo https://tahoma2d:${{ secrets.TAHOMA2D_TOKEN }}@github.com/tahoma2d/tahoma2d_nightlies.git
          git config lfs.https://tahoma2d:${{ secrets.TAHOMA2D_TOKEN }}@github.com/tahoma2d/tahoma2d_nightlies.git.lfs.locksverify false
          git fetch --unshallow
          git tag -f nightly
          git push -f origin nightly
          git tag -f nightly-${{ github.sha }}
          git config --unset-all http.https://github.com/.extraheader
          git push -f nightly_repo nightly-${{ github.sha }}
          git remote rm nightly_repo
      - name: Update Latest Nightly Release
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: toonz\build\Ztoryc-portable-win.zip,toonz\build\Ztoryc-install-win.exe
          artifactContentType: "raw"
          body: ${{ github.event.head_commit.message }}
          name: Latest Nightly ${{ env.NIGHTLYDATE }}
          prerelease: true
          replacesArtifacts: true
          tag: nightly
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Nightlies Release
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: toonz\build\Ztoryc-portable-win.zip,toonz\build\Ztoryc-install-win.exe
          artifactContentType: "raw"
          body: ${{ github.event.head_commit.message }}
          name: ${{ env.NIGHTLYDATETIME }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          owner: tahoma2d
          prerelease: true
          replacesArtifacts: true
          repo: tahoma2d_nightlies
          tag: nightly-${{ github.sha }}
          token: ${{ secrets.TAHOMA2D_TOKEN }}
      - name: Remove existing master cache
        if: ${{ steps.restore-cache.outputs.cache-hit == 'true' && github.ref == 'refs/heads/master' }}
        run: gh cache delete ${{ runner.os }}-refs/heads/master
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Save cache
        if: ${{ steps.restore-cache.outputs.cache-hit != 'true' || github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/AppData/Local/ccache
          key: ${{ runner.os }}-${{ github.ref }}
      - name: Save external dependency cache
        if: ${{ steps.restore-deps-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            thirdparty/qt
            C:\tools\opencv
            C:\local\boost_1_87_0
          key: ${{ runner.os }}-deps-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/read_thirdparty_version.py', 'ci-scripts/windows/tahoma-install.bat', 'ci-scripts/windows/tahoma-get3rdpartyapps.bat', 'ci-scripts/windows/tahoma-build.bat') }}

  publish-release:
    needs: Windows
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          pattern: Ztoryc-*-win*
          merge-multiple: true
          path: release-files
      - name: Resolve release version from ZtorycVersion.cmake
        id: release_version
        run: |
          set -euo pipefail
          F="toonz/cmake/ZtorycVersion.cmake"
          MAJOR=$(sed -n 's/^set(ZTORYC_VERSION_MAJOR \([0-9]*\)).*/\1/p' "$F")
          MINOR=$(sed -n 's/^set(ZTORYC_VERSION_MINOR \([0-9]*\)).*/\1/p' "$F")
          PATCH=$(sed -n 's/^set(ZTORYC_VERSION_PATCH \([0-9]*\)).*/\1/p' "$F")
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${SEMVER}"
          fi
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: List downloaded artifacts
        run: find release-files -type f -print
      - name: Create release tag if missing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.release_version.outputs.tag }}"
          git fetch origin --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists at $(git rev-parse "$TAG")"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
      - name: Publish GitHub Release (Windows installer + portable zip)
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: release-files/Ztoryc-install-win.exe,release-files/Ztoryc-portable-win.zip
          artifactContentType: "raw"
          name: Ztoryc ${{ steps.release_version.outputs.tag }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          prerelease: false
          replacesArtifacts: false
          tag: ${{ steps.release_version.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}