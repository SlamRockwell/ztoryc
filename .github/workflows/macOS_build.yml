# Ztoryc macOS CI — portable DMG per architecture (Intel + Apple Silicon).
#
# Design:
#   - Matrix: two native runners (brew prefix differs: /usr/local vs /opt/homebrew).
#   - Speed: path-filtered push/PR; shallow checkout; granular caches (brew, ccache,
#     ffmpeg, opencv, libgphoto2, tiff, rhubarb, dmgbuild venv); SKIP_DSYM_IN_PACKAGE
#     skips slow dsymutil during packaging; upload-artifact uses low compression for CPU.
#   - Correctness: packaging script verifies no Homebrew paths remain in the bundle.
#
# Triggers: workflow_dispatch (optional GitHub Release); push/PR on relevant paths.
# Nightly steps are conditional on upstream org + default branch (fork parity).
name: Ztoryc macOS Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create a versioned GitHub Release and upload Intel + Apple Silicon DMGs (uses release_tag)'
        type: boolean
        default: false
      release_tag:
        description: 'Optional tag name override. Leave empty to use v<version> from toonz/cmake/ZtorycVersion.cmake.'
        type: string
        required: false
        default: ''
  push:
    branches:
      - master
      - main
    paths:
      - '.github/workflows/macOS_build.yml'
      - 'ci-scripts/**'
      - 'toonz/**'
      - 'thirdparty/**'
      - 'stuff/**'
      - 'plugins/**'
  pull_request:
    branches:
      - master
      - main
    paths:
      - '.github/workflows/macOS_build.yml'
      - 'ci-scripts/**'
      - 'toonz/**'
      - 'thirdparty/**'
      - 'stuff/**'
      - 'plugins/**'

jobs:
  macOS:
    concurrency:
      # Per-architecture: a new push cancels the *previous* run for this matrix leg only
      # (Intel and Apple Silicon stay parallel).
      group: ztoryc-macos-${{ github.ref }}-${{ matrix.suffix }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel (x86_64) — Homebrew in /usr/local
          - runner: macos-15-intel
            suffix: mactel
          # Apple Silicon (arm64) — Homebrew in /opt/homebrew
          - runner: macos-15
            suffix: silicon
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_ANALYTICS: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
      # Stable paths in compile commands → better ccache hit rate across CI runs
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_MAXSIZE: 8G
      CCACHE_COMPRESS: 'true'
      CCACHE_COMPRESSLEVEL: '6'
      # Header metadata-only changes still match (safe default sloppiness set)
      CCACHE_SLOPPINESS: 'include_file_ctime,include_file_mtime'
      SKIP_PKG: '1'
      # Packaging dsymutil loop is several minutes; CI DMGs rarely need dSYM bundles.
      SKIP_DSYM_IN_PACKAGE: '1'
      # Quiets Node 20 deprecation for any action not yet on Node 24 (e.g. upload-artifact@v4).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Set portable DMG name from ZtorycVersion.cmake (semver)
        run: |
          set -euo pipefail
          F="toonz/cmake/ZtorycVersion.cmake"
          MAJOR=$(sed -n 's/^set(ZTORYC_VERSION_MAJOR \([0-9]*\)).*/\1/p' "$F")
          MINOR=$(sed -n 's/^set(ZTORYC_VERSION_MINOR \([0-9]*\)).*/\1/p' "$F")
          PATCH=$(sed -n 's/^set(ZTORYC_VERSION_PATCH \([0-9]*\)).*/\1/p' "$F")
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          echo "ZTORYC_RELEASE_SEMVER=${SEMVER}" >> $GITHUB_ENV
          echo "ZTORYC_DMG_BASENAME=Ztoryc-${SEMVER}-portable-osx-${{ matrix.suffix }}.dmg" >> $GITHUB_ENV
          echo "DMG output: Ztoryc-${SEMVER}-portable-osx-${{ matrix.suffix }}.dmg (from $F)"
      - name: Homebrew prefix (cache paths + deps)
        run: echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'
      - name: CMake version
        run: |
          set -euo pipefail
          cmake --version
      - name: Restore Homebrew downloads cache
        id: brew-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.arch }}-${{ runner.os }}-brew-${{ hashFiles('ci-scripts/osx/tahoma-install.sh') }}
          restore-keys: |
            ${{ runner.arch }}-${{ runner.os }}-brew-
      - name: Restore cache
        id: restore-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            /Users/runner/.ccache
          key: ${{ runner.arch }}-${{ runner.os }}-ccache-8G-${{ github.ref }}
          restore-keys: |
            ${{ runner.arch }}-${{ runner.os }}-ccache-8G-
            ${{ runner.arch }}-${{ runner.os }}-ccache-5G-
            ${{ runner.arch }}-${{ runner.os }}-
      - name: Restore ffmpeg dependency cache
        id: restore-ffmpeg-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/bin/ffmpeg
            ${{ env.BREW_PREFIX }}/bin/ffprobe
            ${{ env.BREW_PREFIX }}/lib/libav*.dylib
            ${{ env.BREW_PREFIX }}/lib/libsw*.dylib
            ${{ env.BREW_PREFIX }}/lib/libpostproc*.dylib
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libav*.pc
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libsw*.pc
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libpostproc.pc
            thirdparty/aom
            thirdparty/dav1d
            thirdparty/ffmpeg
          key: ${{ runner.arch }}-${{ runner.os }}-ffmpeg-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/osx/tahoma-buildffmpeg.sh', 'ci-scripts/osx/tahoma-install.sh') }}

      - name: Restore OpenCV dependency cache
        id: restore-opencv-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/lib/libopencv*.dylib
            ${{ env.BREW_PREFIX }}/include/opencv4
            ${{ env.BREW_PREFIX }}/lib/cmake/opencv4
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/opencv4.pc
            thirdparty/opencv
          key: ${{ runner.arch }}-${{ runner.os }}-opencv-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/osx/tahoma-buildopencv.sh', 'ci-scripts/osx/tahoma-install.sh') }}

      - name: Restore libgphoto2 dependency cache
        id: restore-gphoto-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/lib/libgphoto2*.dylib
            ${{ env.BREW_PREFIX }}/lib/libgphoto2
            ${{ env.BREW_PREFIX }}/lib/libgphoto2_port
            ${{ env.BREW_PREFIX }}/include/gphoto2
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libgphoto2*.pc
            thirdparty/libgphoto2_src
          key: ${{ runner.arch }}-${{ runner.os }}-gphoto-${{ hashFiles('ci-scripts/osx/tahoma-buildlibgphoto2.sh', 'ci-scripts/osx/tahoma-install.sh') }}

      - name: Restore TIFF build cache
        id: restore-tiff-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            thirdparty/tiff-4.2.0
          key: ${{ runner.arch }}-${{ runner.os }}-tiff-${{ hashFiles('ci-scripts/osx/tahoma-build.sh', 'thirdparty/tiff-4.2.0/configure') }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          ci-scripts/osx/tahoma-install.sh
          brew install ccache
          mkdir -p /Users/runner/.ccache
          echo "$(brew --prefix ccache)/libexec" >> "$GITHUB_PATH"
          ccache --set-config=max_size=8G
          ccache --set-config=compression=true
          ccache --show-config | head -30
      - name: Get CanonSDK
        if: ${{ (github.repository_owner == 'tahoma2d' || github.repository_owner == 'manongjohn') && github.event_name == 'push' }}
        run: |
          curl -H "Authorization: token ${{ secrets.TAHOMA2D_TOKEN }}" -H "Accept:application/octet-stream" -fsSL -o EDSDK_Macintosh.zip https://api.github.com/repos/tahoma2d/CanonSDK/releases/assets/223415237
          unzip EDSDK_Macintosh.zip -d EDSDK_Macintosh
          unzip EDSDK_Macintosh/Macintosh.dmg.zip -d EDSDK_Macintosh
          7z x EDSDK_Macintosh/Macintosh.dmg -oEDSDK_Macintosh
          mv EDSDK_Macintosh/Macintosh/EDSDK/* thirdparty/canon
          cd thirdparty/canon/framework/EDSDK.framework/Versions
          rm Current
          ln -s A Current
          cd ..
          rm Resources EDSDK
          ln -s Versions/Current/Resources Resources
          ln -s Versions/Current/EDSDK EDSDK
      - name: Restore Rhubarb cache
        id: restore-rhubarb-cache
        uses: actions/cache/restore@v5
        with:
          path: thirdparty/apps/rhubarb
          key: ${{ runner.arch }}-${{ runner.os }}-rhubarb-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/osx/tahoma-bundle-apps.sh') }}
          restore-keys: |
            ${{ runner.arch }}-${{ runner.os }}-rhubarb-

      - name: Build ffmpeg (skipped when ffmpeg cache hit)
        if: ${{ steps.restore-ffmpeg-cache.outputs.cache-hit != 'true' }}
        env:
          CC: ccache clang
          CXX: ccache clang++
        run: ci-scripts/osx/tahoma-buildffmpeg.sh
      - name: Bundle third-party apps (FFmpeg from brew + Rhubarb)
        run: ci-scripts/osx/tahoma-bundle-apps.sh
      - name: Build OpenCV (skipped when OpenCV cache hit)
        if: ${{ steps.restore-opencv-cache.outputs.cache-hit != 'true' }}
        env:
          CC: ccache clang
          CXX: ccache clang++
        run: ci-scripts/osx/tahoma-buildopencv.sh
      - name: Ensure OpenCV CMake config exists
        run: |
          OPENCV_CFG="${BREW_PREFIX}/lib/cmake/opencv4/OpenCVConfig.cmake"
          if [ -f "$OPENCV_CFG" ]; then
            echo "OpenCV config found: $OPENCV_CFG"
          else
            echo "OpenCV config missing at $OPENCV_CFG — rebuilding OpenCV now"
            export CC="ccache clang"
            export CXX="ccache clang++"
            ci-scripts/osx/tahoma-buildopencv.sh
            test -f "$OPENCV_CFG"
          fi
      - name: Build libgphoto2 (skipped when libgphoto2 cache hit)
        if: ${{ steps.restore-gphoto-cache.outputs.cache-hit != 'true' }}
        env:
          CC: ccache clang
          CXX: ccache clang++
        run: ci-scripts/osx/tahoma-buildlibgphoto2.sh
      - name: ccache stats (before Ztoryc)
        run: ccache -sv || true
      - name: Build Ztoryc
        env:
          CC: ccache clang
          CXX: ccache clang++
        run: ci-scripts/osx/tahoma-build.sh
      - name: ccache stats (after Ztoryc)
        if: success() || failure()
        run: ccache -sv || true
      - name: Verify stuff/themes present before packaging
        run: |
          test -f stuff/config/qss/Dark/Dark.qss
          test "$(find stuff/config/qss -name '*.qss' | wc -l | tr -d ' ')" -ge 1
      - name: Restore dmgbuild Python venv cache
        id: dmgbuild-venv
        uses: actions/cache/restore@v5
        with:
          path: toonz/build/.dmgbuild-venv
          key: ${{ runner.arch }}-${{ runner.os }}-dmgbuild-venv-${{ hashFiles('ci-scripts/osx/requirements-dmgbuild.txt', 'ci-scripts/osx/ztoryc_dmg_settings.py') }}
          restore-keys: |
            ${{ runner.arch }}-${{ runner.os }}-dmgbuild-venv-
      - name: Package portable app and DMG
        run: |
          set -euo pipefail
          bash ./ci-scripts/osx/tahoma-buildpkg.sh
      - name: Save dmgbuild Python venv cache
        if: ${{ success() && steps.dmgbuild-venv.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: toonz/build/.dmgbuild-venv
          key: ${{ runner.arch }}-${{ runner.os }}-dmgbuild-venv-${{ hashFiles('ci-scripts/osx/requirements-dmgbuild.txt', 'ci-scripts/osx/ztoryc_dmg_settings.py') }}
      - uses: actions/upload-artifact@v4
        with:
          name: Ztoryc-${{ env.ZTORYC_RELEASE_SEMVER }}-portable-osx-${{ matrix.suffix }}
          path: toonz/build/${{ env.ZTORYC_DMG_BASENAME }}
          compression-level: 1
      - name: Get Nightly Release Date
        if: ${{ matrix.suffix == 'mactel' && github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          echo "NIGHTLYDATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
          echo "NIGHTLYDATETIME=$(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV
      - name: Create/Update Nightlies Tag
        if: ${{ matrix.suffix == 'mactel' && github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          git remote add nightly_repo https://tahoma2d:${{ secrets.TAHOMA2D_TOKEN }}@github.com/tahoma2d/tahoma2d_nightlies.git
          git config lfs.https://tahoma2d:${{ secrets.TAHOMA2D_TOKEN }}@github.com/tahoma2d/tahoma2d_nightlies.git.lfs.locksverify false
          git fetch --unshallow
          git tag -f nightly
          git push -f origin nightly
          git tag -f nightly-${{ github.sha }}
          git config --unset-all http.https://github.com/.extraheader
          git push -f nightly_repo nightly-${{ github.sha }}
          git remote rm nightly_repo
      - name: Update Latest Nightly Release
        if: ${{ matrix.suffix == 'mactel' && github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: toonz/build/${{ env.ZTORYC_DMG_BASENAME }}
          artifactContentType: "raw"
          body: ${{ github.event.head_commit.message }}
          name: Latest Nightly ${{ env.NIGHTLYDATE }}
          prerelease: true
          replacesArtifacts: true
          tag: nightly
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Nightlies Release
        if: ${{ matrix.suffix == 'mactel' && github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: toonz/build/${{ env.ZTORYC_DMG_BASENAME }}
          artifactContentType: "raw"
          body: ${{ github.event.head_commit.message }}
          name: ${{ env.NIGHTLYDATETIME }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          owner: tahoma2d
          prerelease: true
          replacesArtifacts: true
          repo: tahoma2d_nightlies
          tag: nightly-${{ github.sha }}
          token: ${{ secrets.TAHOMA2D_TOKEN }}
      - name: Remove existing master cache
        if: ${{ steps.restore-cache.outputs.cache-hit == 'true' && github.ref == 'refs/heads/master' }}
        run: gh cache delete "${{ runner.arch }}-${{ runner.os }}-ccache-8G-${{ github.ref }}" || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Save cache
        if: ${{ steps.restore-cache.outputs.cache-hit != 'true' || github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v5
        with:
          path: |
            /Users/runner/.ccache
          key: ${{ runner.arch }}-${{ runner.os }}-ccache-8G-${{ github.ref }}
      - name: Save ffmpeg dependency cache
        if: ${{ steps.restore-ffmpeg-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/bin/ffmpeg
            ${{ env.BREW_PREFIX }}/bin/ffprobe
            ${{ env.BREW_PREFIX }}/lib/libav*.dylib
            ${{ env.BREW_PREFIX }}/lib/libsw*.dylib
            ${{ env.BREW_PREFIX }}/lib/libpostproc*.dylib
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libav*.pc
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libsw*.pc
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libpostproc.pc
            thirdparty/aom
            thirdparty/dav1d
            thirdparty/ffmpeg
          key: ${{ runner.arch }}-${{ runner.os }}-ffmpeg-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/osx/tahoma-buildffmpeg.sh', 'ci-scripts/osx/tahoma-install.sh') }}

      - name: Save OpenCV dependency cache
        if: ${{ steps.restore-opencv-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/lib/libopencv*.dylib
            ${{ env.BREW_PREFIX }}/include/opencv4
            ${{ env.BREW_PREFIX }}/lib/cmake/opencv4
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/opencv4.pc
            thirdparty/opencv
          key: ${{ runner.arch }}-${{ runner.os }}-opencv-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/osx/tahoma-buildopencv.sh', 'ci-scripts/osx/tahoma-install.sh') }}

      - name: Save libgphoto2 dependency cache
        if: ${{ steps.restore-gphoto-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/lib/libgphoto2*.dylib
            ${{ env.BREW_PREFIX }}/lib/libgphoto2
            ${{ env.BREW_PREFIX }}/lib/libgphoto2_port
            ${{ env.BREW_PREFIX }}/include/gphoto2
            ${{ env.BREW_PREFIX }}/lib/pkgconfig/libgphoto2*.pc
            thirdparty/libgphoto2_src
          key: ${{ runner.arch }}-${{ runner.os }}-gphoto-${{ hashFiles('ci-scripts/osx/tahoma-buildlibgphoto2.sh', 'ci-scripts/osx/tahoma-install.sh') }}

      - name: Save TIFF build cache
        if: ${{ steps.restore-tiff-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            thirdparty/tiff-4.2.0
          key: ${{ runner.arch }}-${{ runner.os }}-tiff-${{ hashFiles('ci-scripts/osx/tahoma-build.sh', 'thirdparty/tiff-4.2.0/configure') }}

      - name: Save Rhubarb cache
        if: ${{ success() && steps.restore-rhubarb-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: thirdparty/apps/rhubarb
          key: ${{ runner.arch }}-${{ runner.os }}-rhubarb-${{ hashFiles('ci-scripts/thirdparty_versions.sh', 'ci-scripts/osx/tahoma-bundle-apps.sh') }}

      - name: Save Homebrew downloads cache
        if: ${{ success() && steps.brew-cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.arch }}-${{ runner.os }}-brew-${{ hashFiles('ci-scripts/osx/tahoma-install.sh') }}

  publish-release:
    needs: macOS
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          pattern: Ztoryc-*-portable-osx-*
          merge-multiple: true
          path: release-files
      - name: Resolve release version from ZtorycVersion.cmake
        id: release_version
        run: |
          set -euo pipefail
          F="toonz/cmake/ZtorycVersion.cmake"
          MAJOR=$(sed -n 's/^set(ZTORYC_VERSION_MAJOR \([0-9]*\)).*/\1/p' "$F")
          MINOR=$(sed -n 's/^set(ZTORYC_VERSION_MINOR \([0-9]*\)).*/\1/p' "$F")
          PATCH=$(sed -n 's/^set(ZTORYC_VERSION_PATCH \([0-9]*\)).*/\1/p' "$F")
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${SEMVER}"
          fi
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: List downloaded DMGs
        run: find release-files -name '*.dmg' -print
      - name: Resolve DMG paths for release (artifact zip keeps toonz/build/… layout)
        id: release_dmgs
        run: |
          set -euo pipefail
          MACTEL=$(find release-files -type f -name 'Ztoryc-*-portable-osx-mactel.dmg' | head -1)
          SILICON=$(find release-files -type f -name 'Ztoryc-*-portable-osx-silicon.dmg' | head -1)
          if [ -z "${MACTEL:-}" ] || [ ! -f "$MACTEL" ]; then
            echo "::error::Intel DMG (*-portable-osx-mactel.dmg) not found under release-files"
            find release-files -type f -print || true
            exit 1
          fi
          if [ -z "${SILICON:-}" ] || [ ! -f "$SILICON" ]; then
            echo "::error::Apple Silicon DMG (*-portable-osx-silicon.dmg) not found under release-files"
            find release-files -type f -print || true
            exit 1
          fi
          echo "mactel=$MACTEL" >> "$GITHUB_OUTPUT"
          echo "silicon=$SILICON" >> "$GITHUB_OUTPUT"
      - name: Create release tag if missing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.release_version.outputs.tag }}"
          git fetch origin --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists at $(git rev-parse "$TAG")"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
      - name: Publish GitHub Release (Intel + Apple Silicon DMGs)
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.release_dmgs.outputs.mactel }},${{ steps.release_dmgs.outputs.silicon }}
          artifactContentType: "raw"
          name: Ztoryc ${{ steps.release_version.outputs.tag }}
          body: |
            Ztoryc macOS **${{ steps.release_version.outputs.tag }}** — Intel (x86_64) and Apple Silicon (arm64) portable DMGs.

            Filenames include app semver from `toonz/cmake/ZtorycVersion.cmake` (`Ztoryc-${{ steps.release_version.outputs.semver }}-portable-osx-*.dmg`).

            Built from commit ${{ github.sha }}.
          prerelease: false
          replacesArtifacts: true
          tag: ${{ steps.release_version.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
