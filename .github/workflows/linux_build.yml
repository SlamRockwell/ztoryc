name: Ztoryc Linux Build

on:
  workflow_dispatch:

jobs:
  Linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [ gcc, clang ]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'
      - name: Use cmake
        run: cmake --version
      - name: Restore cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /home/runner/.ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-refs/heads/master
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-
      - name: Restore external dependency cache
        id: restore-deps-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /usr/local/lib
            /usr/local/include
            /usr/local/lib/pkgconfig
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
            thirdparty/openh264
            thirdparty/ffmpeg
            thirdparty/opencv
            thirdparty/libmypaint/src
            thirdparty/libgphoto2_src
          key: ${{ runner.os }}-${{ matrix.compiler }}-deps-${{ hashFiles('ci-scripts/linux/tahoma-build*.sh', 'ci-scripts/linux/tahoma-install.sh', 'toonz/cmake/FindSuperLU.cmake') }}
      - name: Install Dependencies
        run: |
          ci-scripts/linux/tahoma-install.sh
          sudo apt-get install ccache
          mkdir -p /home/runner/.ccache
      - name: Get CanonSDK
        if: ${{ (github.repository_owner == 'tahoma2d' || github.repository_owner == 'manongjohn') && github.event_name == 'push' }}
        run: |
          curl -H "Authorization: token ${{ secrets.TAHOMA2D_TOKEN }}" -H "Accept:application/octet-stream" -fsSL -o EDSDK_Linux.zip https://api.github.com/repos/tahoma2d/CanonSDK/releases/assets/223415219
          unzip EDSDK_Linux.zip -d EDSDK_Linux
          mv EDSDK_Linux/EDSDK/* thirdparty/canon
          chmod 644 thirdparty/canon/Library/x86_64/lib*
      - name: Build ffmpeg
        if: ${{ steps.restore-deps-cache.outputs.cache-hit != 'true' }}
        run: |
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          ci-scripts/linux/tahoma-buildffmpeg.sh
      - name: Build OpenCV
        if: ${{ steps.restore-deps-cache.outputs.cache-hit != 'true' }}
        run: |
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          ci-scripts/linux/tahoma-buildopencv.sh
      - name: Build libmypaint
        if: ${{ steps.restore-deps-cache.outputs.cache-hit != 'true' }}
        run: |
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          ci-scripts/linux/tahoma-buildlibmypaint.sh
      - name: Build libgphoto2
        if: ${{ steps.restore-deps-cache.outputs.cache-hit != 'true' }}
        run: |
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          ci-scripts/linux/tahoma-buildlibgphoto2.sh
      - name: Build Ztoryc
        run: |
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          ci-scripts/linux/tahoma-build.sh
      - name: Get 3rd Party Apps
        run: |
          ci-scripts/linux/tahoma-get3rdpartyapps.sh
      - name: Create Package
        run: |
          ci-scripts/linux/tahoma-buildpkg.sh
          mv toonz/build/Ztoryc-linux.tar.gz toonz/build/Ztoryc-linux-${{ matrix.compiler }}.tar.gz
          mv toonz/build/Ztoryc-linux.deb toonz/build/Ztoryc-linux-${{ matrix.compiler }}.deb
      - uses: actions/upload-artifact@v4
        with:
          name: Ztoryc-linux-${{ matrix.compiler }}.tar.gz
          path: toonz/build/Ztoryc-linux-${{ matrix.compiler }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: Ztoryc-linux-${{ matrix.compiler }}.deb
          path: toonz/build/Ztoryc-linux-${{ matrix.compiler }}.deb
      - name: Get Nightly Release Date
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          echo "NIGHTLYDATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
          echo "NIGHTLYDATETIME=$(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV
      - name: Create/Update Nightlies Tag
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          git remote add nightly_repo https://tahoma2d:${{ secrets.TAHOMA2D_TOKEN }}@github.com/tahoma2d/tahoma2d_nightlies.git
          git config lfs.https://tahoma2d:${{ secrets.TAHOMA2D_TOKEN }}@github.com/tahoma2d/tahoma2d_nightlies.git.lfs.locksverify false
          git fetch --unshallow
          git tag -f nightly
          git push -f origin nightly
          git tag -f nightly-${{ github.sha }}
          git config --unset-all http.https://github.com/.extraheader
          git push -f nightly_repo nightly-${{ github.sha }}
          git remote rm nightly_repo
      - name: Update Latest Nightly Release
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: toonz/build/Ztoryc-linux-${{ matrix.compiler }}.tar.gz,toonz/build/Ztoryc-linux-${{ matrix.compiler }}.deb
          artifactContentType: "raw"
          body: ${{ github.event.head_commit.message }}
          name: Latest Nightly ${{ env.NIGHTLYDATE }}
          prerelease: true
          replacesArtifacts: true
          tag: nightly
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Nightlies Release
        if: ${{ github.repository_owner == 'tahoma2d' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: toonz/build/Ztoryc-linux-${{ matrix.compiler }}.tar.gz,toonz/build/Ztoryc-linux-${{ matrix.compiler }}.deb
          artifactContentType: "raw"
          body: ${{ github.event.head_commit.message }}
          name: ${{ env.NIGHTLYDATETIME }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          owner: tahoma2d
          prerelease: true
          replacesArtifacts: true
          repo: tahoma2d_nightlies
          tag: nightly-${{ github.sha }}
          token: ${{ secrets.TAHOMA2D_TOKEN }}
      - name: Remove existing master cache
        if: ${{ steps.restore-cache.outputs.cache-hit == 'true' && github.ref == 'refs/heads/master' }}
        run: gh cache delete ${{ runner.os }}-${{ matrix.compiler }}-refs/heads/master
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Save cache
        if: ${{ steps.restore-cache.outputs.cache-hit != 'true' || github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v4
        with:
          path: |
            /home/runner/.ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ github.ref }}
      - name: Save external dependency cache
        if: ${{ steps.restore-deps-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            /usr/local/lib
            /usr/local/include
            /usr/local/lib/pkgconfig
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
            thirdparty/openh264
            thirdparty/ffmpeg
            thirdparty/opencv
            thirdparty/libmypaint/src
            thirdparty/libgphoto2_src
          key: ${{ runner.os }}-${{ matrix.compiler }}-deps-${{ hashFiles('ci-scripts/linux/tahoma-build*.sh', 'ci-scripts/linux/tahoma-install.sh', 'toonz/cmake/FindSuperLU.cmake') }}
